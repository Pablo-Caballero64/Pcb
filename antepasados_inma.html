        ul { list-style: none; padding-left: 25px; border-left: 1px solid #ddd; margin: 5px 0; }
        li { margin: 6px 0; position: relative; }
        
        .btn {
            cursor: pointer; width: 22px; height: 22px; display: inline-flex;
            align-items: center; justify-content: center; background: #3498db;
            color: white; border-radius: 4px; font-size: 16px; margin-right: 8px;
            user-select: none;
        }
        /* Clase para ocultar el botón cuando no hay datos */
        .hidden-btn { visibility: hidden; pointer-events: none; }
        
        .card {
            display: inline-block; padding: 5px 12px; border-radius: 6px;
            background: #fff; border: 1px solid #ccc; font-size: 14px;
            min-width: 250px;
        }
        .gen-tag { float: right; font-size: 10px; color: #aaa; margin-top: 3px; }
        .nested { display: none; }
        .show { display: block; }
        h1 { text-align: center; color: #2c3e50; border-bottom: 3px solid #3498db; padding-bottom: 10px; }
    </style>

    // 2. GENERADOR AUTOMÁTICO
    const DATOS_REALES = {};
    for (let i = 1; i <= 16384; i++) {
        DATOS_REALES[i] = {
            nombre: NOMBRES_CONOCIDOS[i] || null, // Guardamos null si no lo conoces
            padre: i < 8191 ? i * 2 : null,
            madre: i < 8191 ? (i * 2) + 1 : null
        };
    }

    // 3. MOTOR DE RENDERIZADO CON FILTRO DE BOTÓN
    function dibujar(id, nivel) {
        if (nivel > 14 || !DATOS_REALES[id]) return "";

        const persona = DATOS_REALES[id];
        
        // REGLA: ¿Tiene este ancestro padres registrados en NOMBRES_CONOCIDOS?
        const tienePadre = NOMBRES_CONOCIDOS[persona.padre];
        const tieneMadre = NOMBRES_CONOCIDOS[persona.madre];
        const mostrarBoton = tienePadre || tieneMadre;

        let html = `<li>`;
        
        // Si no tiene datos de padres, el botón será invisible
        const btnClass = mostrarBoton ? "btn" : "btn hidden-btn";
        html += `<span class="${btnClass}" onclick="toggle(this)">+</span>`;

        html += `<div class="card">
                    <b>${persona.nombre || "Antepasado desconocido"}</b>
                    <span class="gen-tag">G${nivel}</span>
                 </div>`;

        if (mostrarBoton) {
            html += `<ul class="nested">
                        ${dibujar(persona.padre, nivel + 1)}
                        ${dibujar(persona.madre, nivel + 1)}
                    </ul>`;
        }

        html += `</li>`;
        return html;
    }

    document.getElementById('arbol').innerHTML = `<ul>${dibujar(1, 1)}</ul>`;

    function toggle(e) {
        const lista = e.parentElement.querySelector('.nested');
        if (lista) {
            lista.classList.toggle('show');
            e.innerText = lista.classList.contains('show') ? "-" : "+";
            e.style.background = lista.classList.contains('show') ? "#e74c3c" : "#3498db";
        }
    }
